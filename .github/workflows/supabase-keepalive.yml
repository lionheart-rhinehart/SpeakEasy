name: Supabase Keep-Alive

on:
  schedule:
    # Run every 6 hours to prevent Supabase free tier from pausing
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Keep-Alive Function
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "https://bzhxcinrsgcnmktouqdw.supabase.co/functions/v1/keep-alive")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Keep-alive ping failed with status $http_code"
            exit 1
          fi

          echo "Keep-alive ping successful"
