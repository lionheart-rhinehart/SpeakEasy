name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `SpeakEasy v${{ steps.get-version.outputs.version }}`,
              body: 'See CHANGELOG.md for details.\n\nDownload the installer for your platform below.',
              draft: true,
              prerelease: false
            });
            return data.id;

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: ''
          # Uncomment for macOS builds when ready
          # - platform: macos-latest
          #   args: '--target universal-apple-darwin'
          #   target: 'universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Sign, zip, and upload updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          SETUP_EXE="$NSIS_DIR/SpeakEasy_${VERSION}_x64-setup.exe"
          NSIS_ZIP="$NSIS_DIR/SpeakEasy_${VERSION}_x64-setup.nsis.zip"

          echo "=== Bundle directory ==="
          ls -la "$NSIS_DIR/"

          # Write signing key to temp file
          # MUST use printf (not echo) to avoid trailing newline that breaks base64
          # Env vars are named SIGNING_KEY/SIGNING_PASSWORD (NOT TAURI_PRIVATE_KEY)
          # to avoid conflict with tauri signer's auto-detection of TAURI_PRIVATE_KEY env var
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SIGNING_KEY" > "$KEY_FILE"

          # Check if tauri-action already created signed artifacts (unlikely but handle it)
          if [ -f "$NSIS_ZIP" ] && [ -f "${NSIS_ZIP}.sig" ]; then
            echo "Signed artifacts already exist from tauri-action"
          else
            # Verify the exe was built
            if [ ! -f "$SETUP_EXE" ]; then
              echo "ERROR: $SETUP_EXE not found"
              exit 1
            fi

            # Step 1: Sign the exe
            echo "Signing exe..."
            npx tauri signer sign -f "$KEY_FILE" -p "$SIGNING_PASSWORD" "$SETUP_EXE"

            # Step 2: Create .nsis.zip with Stored compression (no compression, method 0)
            # tauri-plugin-updater uses zip crate with default-features=false, which only
            # supports Stored (method 0). Deflate and Deflate64 both fail with
            # "unsupported Zip archive: Compression method not supported"
            # Python's zipfile with ZIP_STORED is the reliable way to produce method 0.
            echo "Creating update zip (Stored compression)..."
            python3 -c "
import zipfile, os, sys
z = zipfile.ZipFile(sys.argv[2], 'w', zipfile.ZIP_STORED)
z.write(sys.argv[1], os.path.basename(sys.argv[1]))
z.close()
print(f'Created {sys.argv[2]} ({os.path.getsize(sys.argv[2])} bytes)')
            " "$SETUP_EXE" "$NSIS_ZIP"

            # Step 3: Sign the zip
            echo "Signing zip..."
            npx tauri signer sign -f "$KEY_FILE" -p "$SIGNING_PASSWORD" "$NSIS_ZIP"
          fi

          echo "=== Final bundle ==="
          ls -la "$NSIS_DIR/"

          # Upload .nsis.zip and .nsis.zip.sig to the release
          echo "Uploading $(basename "$NSIS_ZIP")..."
          gh release upload "v${VERSION}" "$NSIS_ZIP" --clobber
          echo "Uploading $(basename "${NSIS_ZIP}.sig")..."
          gh release upload "v${VERSION}" "${NSIS_ZIP}.sig" --clobber

          # Generate and upload latest.json for the Tauri updater
          SIGNATURE=$(cat "${NSIS_ZIP}.sig")
          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "SpeakEasy v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/SpeakEasy_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          ENDJSON
          echo "Uploading latest.json..."
          gh release upload "v${VERSION}" latest.json --clobber
          echo "Done! All updater artifacts uploaded successfully."

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
