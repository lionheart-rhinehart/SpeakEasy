name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `SpeakEasy v${{ steps.get-version.outputs.version }}`,
              body: 'See CHANGELOG.md for details.\n\nDownload the installer for your platform below.',
              draft: true,
              prerelease: false
            });
            return data.id;

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: ''
          # Uncomment for macOS builds when ready
          # - platform: macos-latest
          #   args: '--target universal-apple-darwin'
          #   target: 'universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Debug bundle contents
        shell: bash
        run: |
          echo "=== NSIS bundle directory ==="
          ls -la src-tauri/target/release/bundle/nsis/ 2>/dev/null || echo "NSIS dir not found"
          echo "=== MSI bundle directory ==="
          ls -la src-tauri/target/release/bundle/msi/ 2>/dev/null || echo "MSI dir not found"

      - name: Upload updater artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          NSIS_DIR="src-tauri/target/release/bundle/nsis"

          # Find the .nsis.zip file
          NSIS_ZIP=$(find "$NSIS_DIR" -name "*.nsis.zip" -not -name "*.sig" 2>/dev/null | head -1)
          if [ -z "$NSIS_ZIP" ]; then
            echo "ERROR: No .nsis.zip file found in $NSIS_DIR"
            echo "Signing may have failed. Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
            exit 1
          fi
          echo "Found update package: $NSIS_ZIP"
          gh release upload "v${VERSION}" "$NSIS_ZIP" --clobber

          # Find the .nsis.zip.sig file
          NSIS_SIG="${NSIS_ZIP}.sig"
          if [ ! -f "$NSIS_SIG" ]; then
            echo "ERROR: Signature file $NSIS_SIG not found"
            exit 1
          fi
          echo "Found signature: $NSIS_SIG"
          gh release upload "v${VERSION}" "$NSIS_SIG" --clobber

          # Read signature content and build latest.json
          SIGNATURE=$(cat "$NSIS_SIG")
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "SpeakEasy v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/SpeakEasy_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          EOF

          echo "Uploading latest.json..."
          gh release upload "v${VERSION}" latest.json --clobber
          echo "Done! Updater artifacts uploaded successfully."

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
